name: Get Project Matrix

on:
  workflow_call:
    outputs:
      matrix:
        description: "Matrix JSON for projects"
        value: ${{ jobs.generate.outputs.matrix }}

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Load matrix config
        id: set-matrix
        run: |
          {
            echo 'matrix<<EOF'
            cat .github/config/projects.json
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"