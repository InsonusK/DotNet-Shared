name: Get Project Matrix

on:
  workflow_call:
    outputs:
      matrix:
        description: "Matrix JSON for projects"
        value: ${{ jobs.generate.outputs.matrix }}

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Load matrix config
        id: set-matrix
        run: |
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          cat .github/config/projects.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT