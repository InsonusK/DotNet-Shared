name: Check Version Bump

on:
  workflow_call:
    inputs:
      csproj:
        description: 'Relative path to the .csproj file'
        required: true
        type: string
      package-id:
        description: 'NuGet package ID (e.g. InsonusK.Shared.Models)'
        required: true
        type: string
      owner:
        description: 'GitHub owner / org (used for the GitHub Packages API call)'
        required: true
        type: string
    secrets:
      github-token:
        required: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version was bumped
        run: |
          LOCAL=$(grep -oPm1 '(?<=<PackageVersion>)[^<]+' "${{ inputs.csproj }}")
          echo "Local version: $LOCAL"

          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.github-token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${{ inputs.owner }}/packages/nuget/${{ inputs.package-id }}/versions" \
            || echo "[]")

          PUBLISHED=$(echo "$RESPONSE" | grep -oP '"name"\s*:\s*"\K[^"]+' | head -1 || echo "none")
          echo "Latest published: $PUBLISHED"

          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "::error::Version $LOCAL was not bumped! Update <PackageVersion> in ${{ inputs.csproj }}."
            exit 1
          fi
          echo "Version check passed: $LOCAL != $PUBLISHED"
