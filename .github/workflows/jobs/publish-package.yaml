name: Publish NuGet Package

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Name of the artifact produced by the build job (e.g. nupkg-models)'
        required: true
        type: string
      create-release:
        description: 'Whether to create a GitHub Release (true for master, false for develop)'
        required: false
        type: boolean
        default: false
      release-tag:
        description: 'Tag name for the GitHub Release (e.g. Models/v1.2.0)'
        required: false
        type: string
        default: ''
      release-name:
        description: 'Display name for the GitHub Release (e.g. Models v1.2.0)'
        required: false
        type: string
        default: ''
    secrets:
      nuget-token:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./nuget-packages/

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nuget-packages/*.nupkg \
            -s nuget \
            -k ${{ secrets.nuget-token }} \
            --skip-duplicate

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push ./nuget-packages/*.nupkg \
            -s github \
            -k ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

      - name: Create GitHub Release
        if: inputs.create-release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release-tag }}
          name: ${{ inputs.release-name }}
          files: ./nuget-packages/*.nupkg
          generate_release_notes: true
