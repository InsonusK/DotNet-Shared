name: Pull Request Check

on:
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: read
  pull-requests: read
  packages: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - folder: src/AnnotationsForDI/**
            csproj: src/AnnotationsForDI/InsonusK.Shared.AnnotationsForDI/InsonusK.Shared.AnnotationsForDI.csproj
            package-id: InsonusK.Shared.AnnotationsForDI
          - folder: src/DataBase/**
            csproj: src/DataBase/InsonusK.Shared.DataBase/InsonusK.Shared.DataBase.csproj
            package-id: InsonusK.Shared.DataBase
          - folder: src/Models/**
            csproj: src/Models/InsonusK.Shared.Models/InsonusK.Shared.Models.csproj
            package-id: InsonusK.Shared.Models
      fail-fast: false
      
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        id: detect
        uses: ./.github/actions/detect-changes
        with:
          project-folder: ${{ matrix.project.folder }}

      - name: Test Project
        if: steps.detect.outputs.changed == 'true'
        uses: ./.github/actions/testing

      - name: Check Version
        if: steps.detect.outputs.changed == 'true'
        uses: ./.github/actions/check-version
        with:
          csproj: ${{ matrix.project.csproj }}
          package-id: ${{ matrix.project.package-id }}
          owner: ${{ github.repository_owner }}
          github-token: ${{ secrets.GITHUB_TOKEN }}