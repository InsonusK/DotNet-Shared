name: Pull Request Check

on:
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: read
  pull-requests: read
  packages: read

jobs:
  check-commit-changes:
    runs-on: ubuntu-latest
    outputs:
      is_need_unittest: ${{ steps.evaluate-version-flags.outputs.is_need_unittest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup CI Context
        id: setup-ci-context
        uses: ./.github/actions/setup-ci-context
        with:
          base_ref: ${{ github.event.pull_request.base.sha || github.event.before }}

      - name: Evaluate Version Flags
        id: evaluate-version-flags
        uses: ./.github/actions/evaluate-version-flags

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-context
          path: |
            ci-context.json
            version-change-flags.json

  run-unittest:
    needs: [check-commit-changes]
    runs-on: ubuntu-latest
    if: needs.check-commit-changes.outputs.is_need_unittest == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Test Project
        uses: ./.github/actions/run-unittest

  version-check:
    needs: [check-commit-changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ci-context

      - name: Verify Version Bump
        uses: ./.github/actions/verify-version-bump

  all_validations_passed:
    name: All Validations Passed
    runs-on: ubuntu-latest
    needs: [run-unittest, version-check]
    if: ${{ always() }}
    steps:
      - name: Check validation results
        run: |
          if [[ "${{ needs.run-unittest.result }}" == "failure" || "${{ needs.version-check.result }}" == "failure" ]]; then
            echo "❌ Some validation jobs failed"
            exit 1
          else
            echo "✅ All validations passed successfully"
          fi