name: Pull Request Check

on:
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: read
  pull-requests: read
  packages: read

jobs:
  define_project_changed:
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.proj-changed.outputs.changes }}
      needs_change: ${{ steps.version-need.outputs.needs_change }}
      is_need_unittest: ${{ steps.unittest-need.outputs.is_need_unittest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect project changes
        id: proj-changed
        uses: ./.github/actions/define-project-has-changed
        with:
          projects_path: '.github/config/projects.json'
          base_ref: ${{ github.event.pull_request.base.sha || github.event.before }}

      - name: Define Version Need Changed
        id: version-need
        uses: ./.github/actions/define-version-need-changed
        with:
          changes: ${{ steps.proj-changed.outputs.changes }}
          projects_path: '.github/config/projects.json'

      - name: Define Is Need Unittest
        id: unittest-need
        uses: ./.github/actions/define-is-need-unittest
        with:
          needs_change: ${{ steps.version-need.outputs.needs_change }}

  run-unittest:
    needs: [define_project_changed]
    runs-on: ubuntu-latest
    if: needs.define_project_changed.outputs.is_need_unittest == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Test Project
        uses: ./.github/actions/run-unittest

  check-version-changed:
    needs: [define_project_changed]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version status
        uses: ./.github/actions/check-version-changed
        with:
          needs_change: ${{ needs.define_project_changed.outputs.needs_change }}
          projects_path: '.github/config/projects.json'
          base_ref: ${{ github.event.pull_request.base.sha || github.event.before }}

  all_validations_passed:
    name: All Validations Passed
    runs-on: ubuntu-latest
    needs: [run-unittest, check-version-changed]
    if: ${{ always() }}
    steps:
      - name: Check validation results
        run: |
          if [[ "${{ needs.run-unittest.result }}" == "failure" || "${{ needs.check-version-changed.result }}" == "failure" ]]; then
            echo "❌ Some validation jobs failed"
            exit 1
          else
            echo "✅ All validations passed successfully"
          fi