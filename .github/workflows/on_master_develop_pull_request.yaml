name: Pull Request Check

on:
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: read
  pull-requests: read
  packages: read

jobs:
  load-matrix:
    uses: ./.github/workflows/get-matrix.yml

  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.load-matrix.outputs.matrix) }}
      fail-fast: false
      
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        id: detect
        uses: ./.github/actions/detect-changes
        with:
          project-folder: ${{ matrix.project.folder }}

      - name: Test Project
        if: steps.detect.outputs.changed == 'true'
        uses: ./.github/actions/testing

      - name: Check Version
        if: steps.detect.outputs.changed == 'true'
        uses: ./.github/actions/check-version
        with:
          csproj: ${{ matrix.project.csproj }}
          package-id: ${{ matrix.project.package-id }}
          owner: ${{ github.repository_owner }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  all_validations_passed:
    name: All Validations Passed
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ always() }}  # run regardless of previous success/failure
    steps:
      - name: Check validation results
        run: |
          if [[ "${{ needs.validate.result }}" != "success" ]]; then
            echo "❌ Some validation jobs failed"
            exit 1
          else
            echo "✅ All validations passed successfully"
          fi